<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全體統計儀表板 · 檢舉通</title>
<style>
  :root{--primary:#d93025;--blue:#3949ab;--bg:#f4f5f7;--text:#1a1c1e;--muted:#6b7280;--border:#e5e7eb;--ok:#0f9d58}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);padding-bottom:40px}
  .container{max-width:520px;margin:0 auto;padding:0 14px}
  header{background:linear-gradient(135deg,#3949ab,#5c6bc0);color:#fff;padding:22px 18px;border-radius:0 0 22px 22px}
  header h1{margin:0;font-size:1.3rem}
  header p{margin:6px 0 0;font-size:.82rem;opacity:.92}
  .card{background:#fff;border-radius:16px;padding:16px;margin-top:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .card h2{margin:0 0 12px;font-size:1rem}
  .statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
  .stat{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .stat .n{font-size:1.9rem;font-weight:800;color:var(--blue)}
  .stat .l{font-size:.78rem;color:var(--muted);margin-top:2px}
  .bar-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.78rem}
  .bar-name{width:130px;flex-shrink:0;text-align:right;color:var(--muted)}
  .bar-track{flex:1;background:#f1f2f4;border-radius:6px;height:16px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,#5c6bc0,#3949ab);border-radius:6px;min-width:2px}
  .bar-fill.red{background:linear-gradient(90deg,#f26b3a,#d93025)}
  .bar-fill.green{background:linear-gradient(90deg,#66bb6a,#0f9d58)}
  .hint{font-size:.76rem;color:var(--muted);margin-top:8px;line-height:1.6}
  .btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:14px}
  .btn-blue{background:var(--blue);color:#fff}
  .btn-ghost{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}
  #loading{text-align:center;color:var(--muted);padding:40px 0}
  a{color:var(--blue)}
</style>
</head>
<body>

<header>
  <div class="container" style="padding:0">
    <h1>🌏 全體統計儀表板</h1>
    <p>檢舉通所有使用者的匿名檢舉統計（僅收集違規類型＋縣市，不含任何個資）</p>
  </div>
</header>

<div class="container">
  <div id="loading">📊 載入統計資料中…</div>
  <div id="content" style="display:none">
    <div class="statgrid" id="statGrid"></div>
    <div class="card"><h2>🚫 違規類型排行</h2><div id="vioBars"></div></div>
    <div class="card"><h2>🏙 縣市分布</h2><div id="cityBars"></div></div>
    <div class="card"><h2>📅 每月檢舉趨勢</h2><div id="monthBars"></div></div>
    <button class="btn btn-ghost" onclick="load()">🔄 重新整理</button>
  </div>
  <a href="index.html" style="text-decoration:none"><button class="btn btn-blue">🚨 我也要檢舉 → 開啟檢舉通</button></a>
  <p class="hint" style="text-align:center">檢舉通唯一官方網址：traffichappy.github.io/jianju-tong</p>
</div>

<script>
const SB_URL="https://aiarxitxszsvumnezqzr.supabase.co";
const SB_KEY="sb_publishable_jnTrGsKlCEveelLPP1ra1Q_qmnMQ9My";
const $=id=>document.getElementById(id);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function bars(el, entries, cls){
  if(!entries.length){el.innerHTML='<p class="hint">尚無資料</p>';return;}
  const max=entries[0][1]||1;
  el.innerHTML=entries.map(([n,v])=>
    `<div class="bar-row"><div class="bar-name">${esc(n)}</div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${v/max*100}%"></div></div><b>${v}</b></div>`).join("");
}

async function load(){
  $("loading").style.display="block"; $("content").style.display="none";
  try{
    const r=await fetch(SB_URL+"/rest/v1/stats?select=vio,city,created_at&order=created_at.desc&limit=50000",{
      headers:{apikey:SB_KEY, Authorization:"Bearer "+SB_KEY}
    });
    if(!r.ok) throw new Error("HTTP "+r.status);
    const rows=await r.json();

    const total=rows.length;
    const now=Date.now();
    const in7d=rows.filter(x=>now-new Date(x.created_at).getTime()<7*86400000).length;
    const in30d=rows.filter(x=>now-new Date(x.created_at).getTime()<30*86400000).length;
    const cities=new Set(rows.map(x=>x.city)).size;

    $("statGrid").innerHTML=`
      <div class="stat"><div class="n">${total.toLocaleString()}</div><div class="l">累計檢舉案件</div></div>
      <div class="stat"><div class="n" style="color:var(--primary)">${in7d.toLocaleString()}</div><div class="l">近7天</div></div>
      <div class="stat"><div class="n" style="color:var(--ok)">${in30d.toLocaleString()}</div><div class="l">近30天</div></div>
      <div class="stat"><div class="n">${cities}</div><div class="l">涵蓋縣市數</div></div>`;

    const agg=(key)=>{const m={};rows.forEach(x=>{const k=x[key]||"未知";m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
    bars($("vioBars"), agg("vio").slice(0,12), "red");
    bars($("cityBars"), agg("city").slice(0,12), "");

    const bm={};
    rows.forEach(x=>{const m=(x.created_at||"").slice(0,7); if(m)bm[m]=(bm[m]||0)+1;});
    const mArr=Object.entries(bm).sort();
    const maxM=Math.max(...mArr.map(x=>x[1]),1);
    $("monthBars").innerHTML=mArr.length?mArr.map(([n,v])=>
      `<div class="bar-row"><div class="bar-name">${esc(n)}</div><div class="bar-track"><div class="bar-fill green" style="width:${v/maxM*100}%"></div></div><b>${v}</b></div>`).join(""):'<p class="hint">尚無資料</p>';

    $("loading").style.display="none"; $("content").style.display="block";
  }catch(e){
    $("loading").textContent="⚠️ 統計資料載入失敗，請稍後再試。（"+e.message+"）";
  }
}
load();
</script>
</body>
</html>
